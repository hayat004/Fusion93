<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Devoir maison</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!-- Slide 1 : titre -->
      <section>
        <h1>Mon titre</h1>
        <p>Mon sous-titre</p>
      </section>

      <!-- Slide 2 : texte -->
      <section>
        <h2>Introduction</h2>
        <p>Mon contenu ici</p>
      </section>

      <!-- Slide 3 : liste animée -->
      <section>
        <h2>Points clés</h2>
        <ul>
          <li class="fragment">Point 1</li>
          <li class="fragment">Point 2</li>
          <li class="fragment">Point 3</li>
        </ul>
      </section>

      <!-- Slide 4 : conclusion -->
      <section>
        <h2>Merci !</h2>
        <p>Des questions ?</p>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      transition: 'slide'
    });
  </script>
</body>
</html>
